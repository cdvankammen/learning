version: "3.9"

services:
  usbip-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usbip-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      USBIP_BIND_HOST: 0.0.0.0
      USBIP_CONFIG_DIR: /home/node/.config/usbip-web
    volumes:
      - usbip-config:/home/node/.config/usbip-web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  usbip-config:
