name: CI Full

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install backend deps
        working-directory: webapp/backend
        run: npm ci
      - name: Run backend tests
        working-directory: webapp/backend
        run: npm test

  frontend:
    uses: ./.github/workflows/ci-frontend.yml
