name: Build and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a GitHub release when dispatching manually'
        type: boolean
        default: false
      release_tag:
        description: 'Release tag to publish when manually dispatching'
        required: false
        default: ''

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            target: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            target: linux-arm64
          - os: macos-14
            platform: macos-arm64
            target: macos-arm64
          - os: windows-latest
            platform: windows-x64
            target: win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: webapp/backend
        run: npm ci --no-audit --no-fund

      - name: Run backend tests
        working-directory: webapp/backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: webapp/frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: webapp/frontend
        run: npm run build

      - name: Package release
        run: |
          ./tools/package-release.sh \
            --platform "${{ matrix.platform }}" \
            --target "${{ matrix.target }}" \
            --outdir "dist/releases"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usbip-${{ matrix.platform }}
          path: |
            dist/releases/*.tar.gz
            dist/releases/*.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.release_tag != '')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.sha256
