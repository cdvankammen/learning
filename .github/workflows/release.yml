name: Build and release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: webapp/backend
        run: npm ci --no-audit --no-fund

      - name: Run tests
        working-directory: webapp/backend
        run: |
          if [ -f package.json ]; then npm test || true; fi

      - name: Package with pkg
        working-directory: webapp/backend
        run: |
          npx --yes pkg index.js --targets "node18-${{ matrix.os == 'ubuntu-latest' && 'linux-x64' || matrix.os == 'macos-latest' && 'macos-x64' || matrix.os == 'windows-latest' && 'win-x64' }}" -o usbip-backend || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: usbip-backend-${{ matrix.os }}
          path: webapp/backend/usbip-backend*
