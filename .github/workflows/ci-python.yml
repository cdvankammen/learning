name: Python CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip && (pip install -r requirements.txt || true)
      - name: Run host-agnostic Python tests
        # --ignore=modules skips tests that require a live Proxmox host (pct, vzdump).
        # Exit code 5 (no tests collected) is allowed on a stock GitHub runner.
        run: pytest -q --ignore=modules || [ $? -eq 5 ]
